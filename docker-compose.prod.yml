#version: '3.9'

networks:
  moteland_prod_net:
    name: moteland_prod_net
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: moteland_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-moteland_whatsapp}
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    networks:
      - moteland_prod_net
    # No exposemos puertos hacia el host para asegurar que Postgres
    # solo sea accesible desde los contenedores en moteland_prod_net.

  redis:
    image: redis:7-alpine
    container_name: moteland_redis
    restart: always
    volumes:
      - redis_data_prod:/data
    networks:
      - moteland_prod_net

  wa-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: moteland_api
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@moteland_postgres:5432/moteland_whatsapp?schema=public
      - REDIS_URL=redis://moteland_redis:6379
      - PORT=3001
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - moteland_prod_net

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dashboard
    container_name: moteland_dashboard
    restart: always
    depends_on:
      - wa-api
    networks:
      - moteland_prod_net

  nginx:
    image: nginx:alpine
    container_name: moteland_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    depends_on:
      - dashboard
      - wa-api
    networks:
      - moteland_prod_net

volumes:
  pg_data_prod:
  redis_data_prod:
