server {
    listen 80;
    server_name admin.moteland.cl api.moteland.cl webhook.moteland.cl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name admin.moteland.cl;

    ssl_certificate /etc/letsencrypt/live/admin.moteland.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.moteland.cl/privkey.pem;
    
    # SSL config (strong ciphers recommended here IRL)

    location / {
        proxy_pass http://moteland_dashboard:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.moteland.cl webhook.moteland.cl;

    ssl_certificate /etc/letsencrypt/live/admin.moteland.cl/fullchain.pem; # Assuming wildcard or SAN cert
    ssl_certificate_key /etc/letsencrypt/live/admin.moteland.cl/privkey.pem;

    location /api/ {
        proxy_pass http://moteland_api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /webhook {
        proxy_pass http://moteland_api:3001;
        proxy_set_header Host $host;
    }

    location /socket.io/ {
        proxy_pass http://moteland_api:3001;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
