#version: '3.9'

networks:
  benderandos_bot_net:
    name: benderandos_bot_net
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    container_name: benderandos_bot_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: benderandos_bot
    ports:
      - "5434:5432"       # ERP usa 5432, bot usa 5434
    networks:
      - benderandos_bot_net
    volumes:
      - bot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: benderandos_bot_redis
    ports:
      - "6381:6379"       # ERP usa 6379, bot usa 6381
    networks:
      - benderandos_bot_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  wa-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: benderandos_bot_api
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@benderandos_bot_postgres:5432/benderandos_bot?schema=public
      - REDIS_URL=redis://benderandos_bot_redis:6379
      - PORT=3001
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - benderandos_bot_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dashboard
    container_name: benderandos_bot_dashboard
    ports:
      - "8080:80"         # ERP usa 8000, dashboard bot usa 8080
    depends_on:
      wa-api:
        condition: service_started
    restart: unless-stopped
    networks:
      - benderandos_bot_net

volumes:
  bot_pg_data: